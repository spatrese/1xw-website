<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>1XW Trading | Login</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0b0f17;
  --bg2:#111827;
  --text:#e5e7eb;
  --muted:#9ca3af;
  --muted2:#6b7280;
  --hairline:#1a2232;
  --accent:#7c9cff;

  --radius-lg:22px;
  --max:1120px;
  --px:clamp(18px,5vw,64px);
}

*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  font-family:'Inter',sans-serif;
  color:var(--text);
  line-height:1.65;
  background:
    radial-gradient(900px 600px at 70% -10%, rgba(124,156,255,.12), transparent 60%),
    radial-gradient(700px 500px at 20% 10%, rgba(124,156,255,.08), transparent 70%),
    var(--bg);
}
a{color:inherit;text-decoration:none;}
.container{max-width:var(--max);margin:0 auto;padding:0 var(--px);}

.nav{
  position:sticky;top:0;z-index:50;
  background:rgba(11,15,23,.75);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--hairline);
}
.nav-inner{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 0;
}
.brand{display:flex;align-items:center;gap:10px;}
.brand img{height:32px;width:auto;display:block;filter:drop-shadow(0 10px 18px rgba(0,0,0,.35));}
.logo{
  font-weight:900; letter-spacing:-.8px;
  text-transform:uppercase; color:var(--accent);
  line-height:1;
}
.nav-links{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end;}
.nav-links a{
  font-size:.9rem;font-weight:800;color:var(--accent);
  padding:10px 12px;border-radius:999px;
}
.nav-links a:hover{color:var(--text);background:rgba(124,156,255,.10);}
.nav-cta{
  margin-left:6px;
  font-weight:900;font-size:.9rem;
  padding:10px 14px;border-radius:999px;
  border:1px solid rgba(124,156,255,.35);
  color:var(--accent);
  background:rgba(124,156,255,.06);
}
.nav-cta:hover{background:rgba(124,156,255,.14);}

main{
  min-height: calc(100vh - 74px);
  display:grid;
  place-items:center;
  padding: 56px 0 90px;
}
.panel{
  width: min(520px, 100%);
  background:var(--bg2);
  border:1px solid var(--hairline);
  border-radius:var(--radius-lg);
  padding:32px;
}
.tag{
  display:inline-flex;
  font-size:.75rem;
  text-transform:uppercase;
  letter-spacing:1.6px;
  color:var(--accent);
  border:1px solid rgba(124,156,255,.35);
  padding:10px 14px;
  border-radius:999px;
  background:rgba(124,156,255,.12);
  margin-bottom:16px;
}
h1{
  font-size:1.6rem;
  letter-spacing:-.6px;
  margin-bottom:8px;
}
p{color:var(--muted);}

.form{
  margin-top:18px;
  display:grid;
  gap:12px;
}
label{
  font-size:.85rem;
  color:var(--muted2);
  font-weight:700;
}
input{
  width:100%;
  padding:12px 14px;
  border-radius:12px;
  border:1px solid var(--hairline);
  background:#0f172a;
  color:var(--text);
  outline:none;
}
input:focus{
  border-color: rgba(124,156,255,.55);
  box-shadow: 0 0 0 4px rgba(124,156,255,.12);
}
.btn{
  padding:12px 18px;
  border-radius:999px;
  border:1px solid var(--accent);
  background:var(--accent);
  color:#0b0f17;
  font-weight:900;
  font-size:.92rem;
  cursor:pointer;
}
.btn:hover{
  background:#9fb6ff;
  border-color:#9fb6ff;
}
.error{
  display:none;
  margin-top:12px;
  padding:12px 14px;
  border-radius:12px;
  border:1px solid rgba(248,113,113,.35);
  background: rgba(248,113,113,.10);
  color: #fecaca;
  font-size:.9rem;
}
small.muted{color:var(--muted2);}
.meta{
  margin-top:12px;
  font-size:.85rem;
  color:var(--muted);
  display:flex;
  justify-content:space-between;
  gap:10px;
  flex-wrap:wrap;
}

@media (max-width:520px){
  .brand img{height:28px;}
  .brand .logo{display:none;}
}
footer{
  padding:22px 0 30px;
  text-align:center;
  color:rgba(100,116,139,.9);
  font-size:.85rem;
}
</style>
</head>

<body>
  <div class="nav">
    <div class="container nav-inner">
      <a class="brand" href="index.html" aria-label="1XW Trading">
        <img src="logo.png" alt="1XW Trading logo" />
        <span class="logo">1XW TRADING</span>
      </a>
      <div class="nav-links">
        <a href="index.html#what">What it is</a>
        <a href="index.html#performance">Performance</a>
        <a href="index.html" class="nav-cta">Home</a>
      </div>
    </div>
  </div>

  <main class="container">
    <div class="panel">
      <div class="tag">Member Access</div>
      <h1>Login</h1>
      <p>Enter your access credentials to view weekly research and the 1XW model dashboard.</p>

      <form class="form" id="loginForm">
        <div>
          <label for="email">Email (optional)</label>
          <input id="email" name="email" type="email" placeholder="name@domain.com" autocomplete="email" />
          <small class="muted">Prototype flow. Access is password-based.</small>
        </div>

        <div>
          <label for="password">Access Password</label>
          <input id="password" name="password" type="password" placeholder="••••••••" autocomplete="current-password" required />
        </div>

        <button class="btn" type="submit">Sign In</button>

        <div class="error" id="errorBox">Invalid password.</div>

        <div class="meta">
          <span><small class="muted">Front-end only (prototype)</small></span>
          <a href="index.html#contact"><small class="muted">Need access?</small></a>
        </div>
      </form>
    </div>
  </main>

  <footer>
    1XW TRADING © 2026. All rights reserved.
  </footer>

<script>
(() => {
  const ACCESS_PASSWORD = "CHANGE_ME"; // set your shared password here
  const TOKEN_KEY = "1xw_auth";

  // If already logged in, go to Weekly Research
  if (localStorage.getItem(TOKEN_KEY) === "ok") {
    window.location.href = "app.html";
    return;
  }

  const form = document.getElementById("loginForm");
  const pwd = document.getElementById("password");
  const err = document.getElementById("errorBox");

  form.addEventListener("submit", (e) => {
    e.preventDefault();
    err.style.display = "none";

    if ((pwd.value || "").trim() === ACCESS_PASSWORD) {
      localStorage.setItem(TOKEN_KEY, "ok");
      window.location.href = "app.html";
    } else {
      err.style.display = "block";
      pwd.focus();
      pwd.select();
    }
  });
})();
</script>
</body>
</html>
